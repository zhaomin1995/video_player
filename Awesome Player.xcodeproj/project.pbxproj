			shellScript = "# Copy app icon\ncp -f \"${PROJECT_DIR}/Awesome Player/App/AppIcon.icns\" \"${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/AppIcon.icns\" 2>/dev/null || true\n\n# Copy FFmpeg dylibs (used by FFmpegBridge at link time)\nmkdir -p \"${BUILT_PRODUCTS_DIR}/${FRAMEWORKS_FOLDER_PATH}\"\nfor dylib in libavformat libavcodec libavutil libswresample libswscale; do\n    SRC=$(find \"${PROJECT_DIR}/Vendor/ffmpeg/lib\" -name \"${dylib}.*.*.*.dylib\" -not -type l | head -1)\n    [ -n \"$SRC\" ] && cp -f \"$SRC\" \"${BUILT_PRODUCTS_DIR}/${FRAMEWORKS_FOLDER_PATH}/\"\ndone\n\n# Copy libvlc dylibs\nmkdir -p \"${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/lib\"\ncp -f \"${PROJECT_DIR}/Vendor/libvlc/lib/\"*.dylib \"${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/lib/\" 2>/dev/null || true\n\n# Copy VLC plugins\nif [ -d \"${PROJECT_DIR}/Vendor/libvlc/plugins\" ]; then\n    mkdir -p \"${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/plugins\"\n    cp -Rf \"${PROJECT_DIR}/Vendor/libvlc/plugins/\"* \"${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/plugins/\" 2>/dev/null || true\nfi\n\n# Copy yt-dlp distribution\nif [ -f \"${PROJECT_DIR}/Vendor/yt-dlp/yt-dlp_macos\" ]; then\n    YTDLP_DIR=\"${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/yt-dlp\"\n    mkdir -p \"$YTDLP_DIR\"\n    cp -Rf \"${PROJECT_DIR}/Vendor/yt-dlp/\"* \"$YTDLP_DIR/\"\n    chmod +x \"$YTDLP_DIR/yt-dlp_macos\"\nfi\n";
